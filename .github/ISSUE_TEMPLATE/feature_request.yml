name: Feature Request
description: Suggest a new command, event, or capability
labels: [enhancement]
body:
  - type: textarea
    attributes:
      label: Description
      description: What would you like ClawCraft to do?
    validations:
      required: true
  - type: textarea
    attributes:
      label: Use case
      description: How would an AI agent use this feature?
    validations:
      required: true
